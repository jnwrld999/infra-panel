<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InfraPanel</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('infra-panel-ui') || '{}');
          var state = s.state || {};
          if (state.theme) document.documentElement.setAttribute('data-theme', state.theme);
          if (state.fontSize) document.documentElement.setAttribute('data-size', state.fontSize);
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
